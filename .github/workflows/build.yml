name: Repackage Dify Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_author:
        description: "plugin author"
        required: true
        type: string
      plugin_name:
        description: "plugin name"
        required: true
        type: string
      plugin_version:
        description: "plugin version"
        required: true
        type: string
      platform_arm:
        description: "Use ARM platform (true = manylinux_2_28_aarch64, false = manylinux_2_17_x86_64)"
        required: true
        default: "false"

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - name: Print workflow inputs
        run: |
          echo "plugin_author  = ${{ inputs.plugin_author }}"
          echo "plugin_name    = ${{ inputs.plugin_name }}"
          echo "plugin_version = ${{ inputs.plugin_version }}"
          echo "platform_arm   = ${{ inputs.platform_arm }}"

      - name: Upgrade pip and setuptools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Resolve platform
        run: |
          if [ "${{ inputs.platform_arm }}" = "true" ]; then
            # 同时指定 ARM 平台的 2.28 和 2.17 标签
            echo "PIP_PLATFORM=manylinux_2_28_aarch64 manylinux_2_17_aarch64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline-arm" >> "$GITHUB_ENV"
          else
            # 同时指定 x86_64 平台的 2.28 和 2.17 标签
            echo "PIP_PLATFORM=manylinux_2_28_x86_64 manylinux_2_17_x86_64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build manylinux compatible wheels (Optional but recommended)
        run: |
          # 创建一个临时目录用于存放处理后的 wheel
          mkdir -p wheelhouse
          # 尝试使用 manylinux2014 容器构建更兼容的 wheel
          # 注意：此步骤可能需要根据你的实际依赖进行调整
          # 如果失败，可以跳过此步骤，直接使用方案一和二
          docker run --rm -v $(pwd):/workspace -w /workspace quay.io/pypa/manylinux2014_x86_64 \
            bash -c "
              # 安装构建依赖
              yum install -y wget || true
              # 尝试下载依赖
              pip download --dest wheelhouse -r requirements.txt 2>/dev/null || echo 'No requirements.txt found, skipping wheel building.'
              # 使用 auditwheel 修复 wheel
              for wheel in wheelhouse/*.whl; do
                if [[ \"\$wheel\" == *manylinux* ]]; then
                  auditwheel repair \"\$wheel\" --plat ${{ env.PIP_PLATFORM }} -w wheelhouse/ || echo \"Failed to repair \$wheel\"
                fi
              done
            " || echo "Docker run failed, continuing with default behavior."
          echo "WHEELHOUSE_DIR=$(pwd)/wheelhouse" >> $GITHUB_ENV

      - name: Make plugin_repackaging.sh executable
        run: chmod +x ./plugin_repackaging.sh

      - name: Run plugin repackaging script
        run: |
          PIP_MIRROR_URL=https://pypi.org/simple \
          ./plugin_repackaging.sh \
          -p ${{ env.PIP_PLATFORM }} \
          -s ${{ env.PACKAGE_SUFFIX }} \
          --find-links ${{ env.WHEELHOUSE_DIR }} \
          market \
          "${{ github.event.inputs.plugin_author }}" \
          "${{ github.event.inputs.plugin_name }}" \
          "${{ github.event.inputs.plugin_version }}"
        env:
          PIP_PLATFORM: ${{ env.PIP_PLATFORM }}
          WHEELHOUSE_DIR: ${{ env.WHEELHOUSE_DIR }}

      - name: Find repackaged artifact
        run: |
          ARTIFACT_PATH=$(find . -type f -name "*-${PACKAGE_SUFFIX}.difypkg" | head -n 1)
          if [ -z "$ARTIFACT_PATH" ]; then
            echo "No *-${PACKAGE_SUFFIX}.difypkg artifact found!"
            exit 1
          fi
      
          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
