name: Repackage Dify Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_author:
        description: "plugin author"
        required: true
        type: string
        default: "langgenius"

      plugin_name:
        description: "plugin name"
        required: true
        type: string
        default: "openai_api_compatible"

      plugin_version:
        description: "plugin version"
        required: true
        type: string
        default: "0.0.53"

      pip_platform:
        description: "pip platform args"
        required: true
        type: string
        default: >-
          --platform manylinux_2_28_aarch64
          --platform manylinux_2_17_aarch64
          --platform manylinux2014_aarch64
          --python-version 3.12
          --implementation cp
          --abi cp312

      package_suffix:
        description: "artifact suffix"
        required: true
        type: string
        default: "offline-arm"

jobs:
  repackage:
    runs-on: ubuntu-latest

    steps:
      - name: Print workflow inputs
        run: |
          echo "plugin_author  = ${{ inputs.plugin_author }}"
          echo "plugin_name    = ${{ inputs.plugin_name }}"
          echo "plugin_version = ${{ inputs.plugin_version }}"
          echo "pip_platform   = ${{ inputs.pip_platform }}"
          echo "package_suffix = ${{ inputs.package_suffix }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Make plugin_repackaging.sh executable
        run: chmod +x ./plugin_repackaging.sh

      - name: Run plugin repackaging script
        run: |
          PIP_MIRROR_URL=https://pypi.org/simple \
          ./plugin_repackaging.sh \
          -p "${{ inputs.pip_platform }}" \
          -s "${{ inputs.package_suffix }}" \
          market \
          "${{ inputs.plugin_author }}" \
          "${{ inputs.plugin_name }}" \
          "${{ inputs.plugin_version }}"

      - name: Find repackaged artifact
        run: |
          ARTIFACT_PATH=$(find . -type f -name "*-${{ inputs.package_suffix }}.difypkg" | head -n 1)

          if [ -z "$ARTIFACT_PATH" ]; then
            echo "No *-${{ inputs.package_suffix }}.difypkg artifact found!"
            echo "Current directory files:"
            find . -maxdepth 3 -type f
            exit 1
          fi

          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
